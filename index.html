<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo JS Racing</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --bg-dark: #0a0a0c;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        canvas {
            background: #222;
            display: block;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        .menu-screen {
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--neon-pink);
            text-shadow: 2px 2px var(--neon-blue);
            margin-bottom: 20px;
        }

        .stats {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            font-family: monospace;
            font-size: 1.2rem;
            color: var(--neon-blue);
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            color: white;
            border: 2px solid var(--neon-pink);
            cursor: pointer;
            transition: 0.3s;
            margin: 10px;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink);
        }

        .selection-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .card {
            padding: 10px;
            border: 1px solid #444;
            cursor: pointer;
        }

        .card.active {
            border-color: var(--neon-blue);
            background: rgba(0, 243, 255, 0.2);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats" id="hud">
        Speed: <span id="speed-val">0</span> km/h<br>
        Lap: <span id="lap-val">1/3</span><br>
        Track: <span id="track-name">-</span>
    </div>

    <div id="ui-overlay">
        <div id="start-screen" class="menu-screen">
            <h1>Turbo JS Racing</h1>
            
            <h3>Select Your Car</h3>
            <div class="selection-grid" id="car-select">
                <!-- Cars generated by JS -->
            </div>

            <h3>Select Track</h3>
            <div class="selection-grid" id="track-select">
                <!-- Tracks generated by JS -->
            </div>

            <button onclick="game.start()">Start Race</button>
        </div>

        <div id="finish-screen" class="menu-screen hidden">
            <h1>Race Finished!</h1>
            <p id="final-time"></p>
            <button onclick="location.reload()">Main Menu</button>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
/**
 * RACING GAME ENGINE
 * Features: Pseudo-3D road rendering (OutRun style), 10 Tracks, 5 Cars.
 */

const CONFIG = {
    fps: 60,
    width: 800,
    height: 600,
    roadWidth: 2000,
    segmentLength: 200,
    rumbleLength: 3,
    lanes: 3,
    fieldOfView: 100,
    cameraHeight: 1000,
    drawDistance: 300,
    fogDensity: 5
};

const CARS = [
    { name: "Sprinter", color: "#ff0000", maxSpeed: 12000, accel: 80, handling: 3 },
    { name: "Tank", color: "#00ff00", maxSpeed: 9000, accel: 50, handling: 2 },
    { name: "Neon", color: "#00f3ff", maxSpeed: 15000, accel: 100, handling: 4 },
    { name: "Drifter", color: "#ffff00", maxSpeed: 11000, accel: 90, handling: 5 },
    { name: "Bullet", color: "#ffffff", maxSpeed: 18000, accel: 120, handling: 2 }
];

const TRACKS = [
    { name: "Neon City", curve: 2, hill: 20, length: 500 },
    { name: "Desert Heat", curve: 0, hill: 0, length: 600 },
    { name: "Alpine Pass", curve: 5, hill: 60, length: 800 },
    { name: "Ocean Drive", curve: 3, hill: 10, length: 500 },
    { name: "The Void", curve: 8, hill: 0, length: 400 },
    { name: "Volcano Run", curve: 4, hill: 100, length: 700 },
    { name: "Cyber Tunnel", curve: 1, hill: -20, length: 1000 },
    { name: "Midnight Sky", curve: 6, hill: 40, length: 550 },
    { name: "Toxic Swamp", curve: 3, hill: 5, length: 650 },
    { name: "Final Lap", curve: 9, hill: 120, length: 1200 }
];

class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = CONFIG.width;
        this.canvas.height = CONFIG.height;
        
        this.reset();
        this.initUI();
        this.keys = {};
        
        window.addEventListener('keydown', e => this.keys[e.code] = true);
        window.addEventListener('keyup', e => this.keys[e.code] = false);
    }

    reset() {
        this.position = 0;
        this.playerX = 0;
        this.speed = 0;
        this.selectedCar = 0;
        this.selectedTrack = 0;
        this.segments = [];
        this.trackLength = 0;
        this.running = false;
    }

    initUI() {
        const carGrid = document.getElementById('car-select');
        CARS.forEach((car, i) => {
            const div = document.createElement('div');
            div.className = `card ${i === 0 ? 'active' : ''}`;
            div.innerHTML = `<strong>${car.name}</strong><br><small>Spd: ${car.maxSpeed/100}</small>`;
            div.onclick = () => {
                document.querySelectorAll('#car-select .card').forEach(c => c.classList.remove('active'));
                div.classList.add('active');
                this.selectedCar = i;
            };
            carGrid.appendChild(div);
        });

        const trackGrid = document.getElementById('track-select');
        TRACKS.forEach((track, i) => {
            const div = document.createElement('div');
            div.className = `card ${i === 0 ? 'active' : ''}`;
            div.innerHTML = `Track ${i+1}<br><small>${track.name}</small>`;
            div.onclick = () => {
                document.querySelectorAll('#track-select .card').forEach(c => c.classList.remove('active'));
                div.classList.add('active');
                this.selectedTrack = i;
            };
            trackGrid.appendChild(div);
        });
    }

    buildTrack() {
        this.segments = [];
        const t = TRACKS[this.selectedTrack];
        for (let n = 0; n < t.length; n++) {
            this.segments.push({
                index: n,
                p1: { world: { y: Math.sin(n/10) * t.hill, z: n * CONFIG.segmentLength }, screen: {} },
                p2: { world: { y: Math.sin((n+1)/10) * t.hill, z: (n+1) * CONFIG.segmentLength }, screen: {} },
                curve: (n > 50 && n < t.length - 50) ? t.curve : 0,
                color: Math.floor(n / CONFIG.rumbleLength) % 2 ? { road: '#333', grass: '#111', rumble: '#f00' } : { road: '#444', grass: '#000', rumble: '#fff' }
            });
        }
        this.trackLength = this.segments.length * CONFIG.segmentLength;
    }

    start() {
        document.getElementById('ui-overlay').classList.add('hidden');
        document.getElementById('track-name').innerText = TRACKS[this.selectedTrack].name;
        this.buildTrack();
        this.running = true;
        this.loop();
    }

    update(dt) {
        const car = CARS[this.selectedCar];
        
        // Acceleration / Braking
        if (this.keys['ArrowUp']) this.speed += car.accel;
        else if (this.keys['ArrowDown']) this.speed -= car.accel;
        else this.speed -= car.accel / 2;

        // Steering
        if (this.keys['ArrowLeft'] && this.speed > 0) this.playerX -= 0.02 * (this.speed / car.maxSpeed) * car.handling;
        if (this.keys['ArrowRight'] && this.speed > 0) this.playerX += 0.02 * (this.speed / car.maxSpeed) * car.handling;

        // Friction and Limits
        this.speed = Math.max(0, Math.min(this.speed, car.maxSpeed));
        this.position += this.speed;

        // Off-road penalty
        if (Math.abs(this.playerX) > 1 && this.speed > 3000) this.speed -= 200;

        // HUD
        document.getElementById('speed-val').innerText = Math.floor(this.speed / 100);
        
        if (this.position >= this.trackLength) {
            this.running = false;
            document.getElementById('ui-overlay').classList.remove('hidden');
            document.getElementById('finish-screen').classList.remove('hidden');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('final-time').innerText = "Course Completed!";
        }
    }

    project(p, cameraX, cameraY, cameraZ, cameraDepth) {
        p.screen.scale = cameraDepth / (p.world.z - cameraZ);
        p.screen.x = Math.round((CONFIG.width / 2) + (p.screen.scale * (p.world.x - cameraX) * CONFIG.width / 2));
        p.screen.y = Math.round((CONFIG.height / 2) - (p.screen.scale * (p.world.y - cameraY) * CONFIG.height / 2));
        p.screen.w = Math.round(p.screen.scale * CONFIG.roadWidth * CONFIG.width / 2);
    }

    render() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, CONFIG.width, CONFIG.height);

        // Background / Sky
        ctx.fillStyle = "#050510";
        ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);

        const baseSegment = this.findSegment(this.position);
        const cameraHeight = CONFIG.cameraHeight + baseSegment.p1.world.y;
        const cameraDepth = 1 / Math.tan((CONFIG.fieldOfView / 2) * Math.PI / 180);
        
        let maxY = CONFIG.height;
        let x = 0;
        let dx = -(baseSegment.curve * (this.position / CONFIG.segmentLength % 1));

        for (let n = 0; n < CONFIG.drawDistance; n++) {
            const segment = this.segments[(baseSegment.index + n) % this.segments.length];
            const looped = segment.index < baseSegment.index;
            
            this.project(segment.p1, this.playerX * CONFIG.roadWidth, cameraHeight, this.position - (looped ? this.trackLength : 0), cameraDepth);
            this.project(segment.p2, this.playerX * CONFIG.roadWidth - x, cameraHeight, this.position - (looped ? this.trackLength : 0), cameraDepth);

            x += dx;
            dx += segment.curve;

            if (segment.p1.screen.z <= cameraDepth || segment.p2.screen.y >= maxY) continue;

            this.drawSegment(ctx, segment);
            maxY = segment.p1.screen.y;
        }

        this.drawPlayer(ctx);
    }

    drawSegment(ctx, s) {
        const p1 = s.p1.screen;
        const p2 = s.p2.screen;

        // Grass
        ctx.fillStyle = s.color.grass;
        ctx.fillRect(0, p2.y, CONFIG.width, p1.y - p2.y);

        // Road
        this.drawPolygon(ctx, p1.x - p1.w, p1.y, p1.x + p1.w, p1.y, p2.x + p2.w, p2.y, p2.x - p2.w, p2.y, s.color.road);

        // Rumble strips
        const w1 = p1.w * 0.1;
        const w2 = p2.w * 0.1;
        this.drawPolygon(ctx, p1.x - p1.w - w1, p1.y, p1.x - p1.w, p1.y, p2.x - p2.w, p2.y, p2.x - p2.w - w2, p2.y, s.color.rumble);
        this.drawPolygon(ctx, p1.x + p1.w + w1, p1.y, p1.x + p1.w, p1.y, p2.x + p2.w, p2.y, p2.x + p2.w + w2, p2.y, s.color.rumble);
    }

    drawPolygon(ctx, x1, y1, x2, y2, x3, y3, x4, y4, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.lineTo(x3, y3);
        ctx.lineTo(x4, y4);
        ctx.closePath();
        ctx.fill();
    }

    drawPlayer(ctx) {
        const car = CARS[this.selectedCar];
        const w = 80;
        const h = 50;
        ctx.fillStyle = car.color;
        // Basic car shape
        ctx.fillRect(CONFIG.width / 2 - w / 2, CONFIG.height - h - 20, w, h);
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(CONFIG.width / 2 - w / 2 + 5, CONFIG.height - h - 15, w - 10, h / 2);
    }

    findSegment(z) {
        return this.segments[Math.floor(z / CONFIG.segmentLength) % this.segments.length];
    }

    loop() {
        if (!this.running) return;
        this.update();
        this.render();
        requestAnimationFrame(() => this.loop());
    }
}

const game = new Game();
</script>

</body>
              </html>
